// Fixed: Open uses separate message types per chunk, not a oneof

syntax = "proto3";
package lsdkmessages;

service LogixSDK {
    rpc Open(stream OpenChunk) returns (stream OperationResponse);
    rpc GetAllExecutables(EmptyRequest) returns (stream OperationResponse);
    rpc ExportToL5X(ExportRequest) returns (stream OperationResponse);
    rpc PartialExportToXmlFile(PartialExportRequest) returns (stream OperationResponse);
    rpc KeepAlive(EmptyRequest) returns (stream OperationResponse);
}

// Open is client-streaming. First message carries the auth token in field 1.
// Subsequent messages carry file data in field 2.
message OpenChunk {
    bytes field_1 = 1;   // auth token in first message
    bytes field_2 = 2;   // file data in subsequent messages
}

message EmptyRequest {}
message ExportRequest { string output_path = 1; bool force = 2; }
message PartialExportRequest { string xpath = 1; string output_file_path = 2; }

message OperationResponse {
    oneof result {
        string string_result = 1;
        uint32 uint_result = 2;
        bytes bytes_result = 3;
        bool bool_result = 4;
        StringList executables_result = 5;
        string error_message = 6;
    }
}

message StringList { repeated string items = 1; }
