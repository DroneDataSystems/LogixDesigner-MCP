// Logix Designer SDK gRPC Protocol — Verified from Wire Capture
// Service: LSDKMessages.LogixSDK
// Server: Kestrel (ASP.NET Core), gRPC-dotnet 2.76.0

syntax = "proto3";
package lsdkmessages;

service LogixSDK {
    // ── Confirmed from WireMCP capture ──

    // Open: client-streaming. Msg 1 = FactoryTalk auth, Msg 2+ = ACD file data.
    rpc Open(stream FileChunk) returns (stream OperationResponse);

    // GetAllExecutables: returns program/routine XPaths
    rpc GetAllExecutables(EmptyRequest) returns (stream OperationResponse);

    // ExportToL5X: triggers L5X export (SaveAs with L5X extension)
    rpc ExportToL5X(ExportRequest) returns (stream OperationResponse);

    // PartialExportToXmlFile: exports a subtree by XPath
    rpc PartialExportToXmlFile(PartialExportRequest) returns (stream OperationResponse);

    // KeepAlive: heartbeat pings
    rpc KeepAlive(EmptyRequest) returns (stream OperationResponse);
}

// ── Open (client-streaming) ──────────────────────────────────────────

message FileChunk {
    oneof payload {
        bytes auth_token = 1;  // FactoryTalk JWT (1656B base64 in first message)
        bytes file_data = 2;   // ACD file contents in 30KB chunks
    }
}

// ── Standard messages ────────────────────────────────────────────────

message EmptyRequest {}

message ExportRequest {
    string output_path = 1;
    bool force = 2;
}

message PartialExportRequest {
    string xpath = 1;
    string output_file_path = 2;
}

message OperationResponse {
    oneof result {
        string string_result = 1;
        uint32 uint_result = 2;
        bytes bytes_result = 3;
        bool bool_result = 4;
        StringList executables_result = 5;
        string error_message = 6;
    }
}

message StringList {
    repeated string items = 1;
}
