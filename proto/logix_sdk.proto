// Logix Designer SDK gRPC — Verified from decompiled C# source
syntax = "proto3";
package lsdkmessages;

service LogixSDK {
    rpc Open(stream ProjectOpenRequest) returns (stream OperationResponse);
    rpc GetAllExecutables(ProjectRequest) returns (stream OperationResponse);
    rpc ExportToL5X(ExportL5XRequest) returns (stream OperationResponse);
    rpc ExportToL5K(ProjectRequest) returns (stream OperationResponse);
    rpc KeepAlive(EmptyRequest) returns (stream OperationResponse);
}

message ProjectOpenRequest {
    oneof chunk {
        string user_token = 1;
        FileData file_data = 2;
    }
}

message FileData {
    oneof chunk {
        bytes content = 1;
        uint32 crc32 = 2;
    }
}

message ProjectRequest {
    string key = 1;
}

message ExportL5XRequest {
    string key = 1;
    bool detailed_l5x = 2;
}

message EmptyRequest {}

message OperationResponse {
    oneof result {
        OperationResult operation_result = 1;
        OperationData data = 2;
    }
}

message OperationResult {
    uint32 result_value = 1;
    string result_message = 2;
}

message OperationData {
    oneof value {
        string string_value = 1;
        uint32 uint32_value = 2;
        bool bool_value = 3;
        StringArray string_array_value = 4;
    }
}

message StringArray {
    repeated string values = 1;
}
